name: "Terraform Plan"

on:
  push:
    branches:
      - main

env:
  TF_IN_AUTOMATION : true

permissions:
  contents: read

jobs:
  plan:
    name: "Plan"
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref || github.ref}}

      - name: Terraform Format
        run: terraform fmt -recursive

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="endpoint=${{ secrets.BACKEND_ENDPOINT }}" \
            -backend-config="access_key=${{ secrets.BACKEND_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.BACKEND_SECRET_KEY }}"

      - name: Terraform Validate
        run: terraform validate

      - name: Create SSH Key File
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Create terraform.tfvars
        run: |
          cat <<'EOF' > terraform.tfvars
          ${{ secrets.TERRAFORM_TFVARS }}
          EOF

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="endpoint=${{ secrets.BACKEND_ENDPOINT }}" \
            -backend-config="access_key=${{ secrets.BACKEND_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.BACKEND_SECRET_KEY }}"

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -input=false -no-color
        env:
          TF_VAR_ssh_priv_key: "./private_key.pem"
      - name: Commit formatted changes
        id: git_commit
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: |
            plan: terraform plan and fmt
          file_pattern: .

      - name: Upload Plan to Cloudflare R2
        run: |
          aws s3 cp tfplan s3://terraform/tfplan-${{ steps.git_commit.outputs.commit_hash || github.sha }} --endpoint-url ${{ secrets.BACKEND_ENDPOINT }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKEND_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKEND_SECRET_KEY }}
          AWS_REGION: auto

      - name: Cleanup Temporary Files
        if: always()
        run: rm -f private_key.pem terraform.tfvars tfplan plan.txt
