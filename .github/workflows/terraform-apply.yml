name: "Terraform Apply"

on:
  workflow_dispatch:
  push:
    tags:
      - 'r*'

permissions:
  contents: read

jobs:
  apply:
    name: "Apply"
    runs-on: self-hosted
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create SSH Key File
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Create terraform.tfvars
        run: |
          cat <<'EOF' > terraform.tfvars
          ${{ secrets.TERRAFORM_TFVARS }}
          EOF

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="endpoint=${{ secrets.BACKEND_ENDPOINT }}" \
            -backend-config="access_key=${{ secrets.BACKEND_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.BACKEND_SECRET_KEY }}"

      - name: Download Plan from Cloudflare R2
        run: |
          aws s3 cp s3://terraform/tfplan-${{ github.sha }} tfplan --endpoint-url ${{ secrets.BACKEND_ENDPOINT }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.BACKEND_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKEND_SECRET_KEY }}
          AWS_REGION: auto

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan
        env:
          TF_VAR_ssh_priv_key: "./private_key.pem"

      - name: Cleanup Temporary Files
        if: always()
        run: rm -f private_key.pem terraform.tfvars tfplan
